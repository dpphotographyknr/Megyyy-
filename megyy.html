<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Hey Megna ❤️</title>
<link rel="icon" href="data:,">
<style>
  :root{
    --pink-1:#ff8fb3;
    --pink-2:#ff5c8a;
    --purple-1:#b47cff;
    --purple-2:#7c5cff;
    --red-1:#ff5c7a;
    --white-glass:rgba(255,255,255,0.14);
    --white-glass-strong:rgba(255,255,255,0.28);
    --border-glass:rgba(255,255,255,0.45);
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;width:100%;height:100%;
    overflow-x:hidden;
    font-family:"Snell Roundhand","Segoe Script","Optima",-apple-system,"SF Pro Display",
                "Helvetica Neue",Arial,sans-serif;
    background:#1a0f2b;
  }

  /* ---------- Typography helpers ---------- */
  .display-font{
    font-family:"Optima","Snell Roundhand",-apple-system,"SF Pro Display","Segoe UI",serif;
  }
  .body-font{
    font-family:-apple-system,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
  }

  /* ---------- Loading screen ---------- */
  #loader{
    position:fixed;inset:0;z-index:9999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#2b1140,#4a1942 40%,#7a2148 70%,#a13a5a);
    transition:opacity 1s ease, visibility 1s ease;
  }
  #loader.hide{opacity:0;visibility:hidden;pointer-events:none;}
  .loader-heart{
    width:70px;height:70px;position:relative;margin-bottom:28px;
    animation:loaderPulse 1.1s ease-in-out infinite;
  }
  .loader-heart::before,.loader-heart::after{
    content:"";position:absolute;top:0;width:36px;height:56px;
    background:linear-gradient(145deg,#ff8fb3,#ff5c8a 60%,#ff3d68);
    border-radius:36px 36px 0 0;
    box-shadow:0 0 30px 6px rgba(255,120,160,0.65);
  }
  .loader-heart::before{left:35px;transform:rotate(-45deg);transform-origin:0 100%;}
  .loader-heart::after{left:-1px;transform:rotate(45deg);transform-origin:100% 100%;}
  @keyframes loaderPulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.15);}
  }
  #loader p{
    color:#fff;font-size:17px;letter-spacing:0.5px;opacity:0.9;
    font-family:-apple-system,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
    animation:fadeInOut 1.6s ease-in-out infinite;
  }
  @keyframes fadeInOut{0%,100%{opacity:0.45;}50%{opacity:1;}}

  /* ---------- Background ---------- */
  #bg-canvas-wrap{
    position:fixed;inset:0;z-index:0;overflow:hidden;
  }
  .liquid-bg{
    position:absolute;inset:-10%;
    background:radial-gradient(circle at 20% 30%, #ff8fb3aa, transparent 55%),
               radial-gradient(circle at 80% 20%, #b47cffaa, transparent 50%),
               radial-gradient(circle at 60% 80%, #ff5c8aaa, transparent 55%),
               radial-gradient(circle at 15% 85%, #7c5cffaa, transparent 55%),
               linear-gradient(135deg,#1a0f2b,#33163f 40%,#5a1c47 70%,#7a2148);
    background-size:200% 200%;
    animation:liquidMove 22s ease-in-out infinite;
    filter:blur(10px) saturate(1.2);
  }
  @keyframes liquidMove{
    0%{background-position:0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%;}
    50%{background-position:60% 40%, 40% 60%, 40% 40%, 60% 60%, 100% 100%;}
    100%{background-position:0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%;}
  }

  .aurora{
    position:absolute;inset:0;
    mix-blend-mode:screen;
    opacity:0.5;
    background:conic-gradient(from 180deg at 50% 50%,
      transparent, #ff8fb355, transparent 30%, #b47cff55, transparent 55%, #ff5c8a44, transparent 80%, transparent);
    animation:auroraSpin 40s linear infinite;
    filter:blur(30px);
  }
  @keyframes auroraSpin{
    from{transform:rotate(0deg) scale(1.3);}
    to{transform:rotate(360deg) scale(1.3);}
  }

  .stars{position:absolute;inset:0;}
  .star{
    position:absolute;width:2px;height:2px;border-radius:50%;
    background:#fff;opacity:0.7;
    animation:twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:0.15;transform:scale(1);}
    50%{opacity:1;transform:scale(1.6);}
  }

  .bubble{
    position:absolute;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.55), rgba(255,255,255,0.05) 60%, rgba(255,255,255,0.15) 100%);
    border:1px solid rgba(255,255,255,0.35);
    box-shadow:inset 0 0 20px rgba(255,255,255,0.4), 0 8px 30px rgba(0,0,0,0.15);
    backdrop-filter:blur(2px);
    animation:floatBubble linear infinite;
    opacity:0.8;
  }
  @keyframes floatBubble{
    0%{transform:translateY(0) translateX(0) rotate(0deg);}
    50%{transform:translateY(-40px) translateX(20px) rotate(180deg);}
    100%{transform:translateY(-100vh) translateX(-10px) rotate(360deg);}
  }

  .drift-heart{
    position:absolute;
    font-size:22px;
    color:rgba(255,150,180,0.55);
    text-shadow:0 0 12px rgba(255,120,170,0.8);
    animation:driftUp linear infinite;
    opacity:0.75;
    pointer-events:none;
  }
  @keyframes driftUp{
    0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0;}
    10%{opacity:0.8;}
    90%{opacity:0.8;}
    100%{transform:translateY(-110vh) translateX(30px) rotate(20deg);opacity:0;}
  }

  #mouse-glow{
    position:fixed;width:420px;height:420px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,150,190,0.22), rgba(180,120,255,0.12) 40%, transparent 70%);
    pointer-events:none;z-index:1;
    transform:translate(-50%,-50%);
    transition:opacity 0.3s ease;
    filter:blur(2px);
  }

  /* ---------- Main layout ---------- */
  .page{
    position:relative;z-index:2;
    min-height:100vh;width:100%;
    display:flex;align-items:center;justify-content:center;
    padding:32px 16px;
  }

  .card{
    position:relative;
    width:100%;max-width:520px;
    padding:48px 36px 42px;
    border-radius:32px;
    background:linear-gradient(160deg, rgba(255,255,255,0.22), rgba(255,255,255,0.08));
    border:1px solid var(--border-glass);
    box-shadow:
      0 25px 70px rgba(60,10,50,0.45),
      inset 0 1px 1px rgba(255,255,255,0.6),
      inset 0 -20px 40px rgba(255,255,255,0.05);
    backdrop-filter:blur(22px) saturate(1.4);
    -webkit-backdrop-filter:blur(22px) saturate(1.4);
    animation:cardEntrance 1.4s cubic-bezier(.19,1,.22,1) both, cardFloat 6s ease-in-out 1.4s infinite;
    overflow:hidden;
    text-align:center;
  }
  .card::before{
    content:"";position:absolute;top:-60%;left:-30%;width:160%;height:100%;
    background:linear-gradient(120deg, rgba(255,255,255,0.35), transparent 60%);
    transform:rotate(-8deg);
    pointer-events:none;
  }
  @keyframes cardEntrance{
    0%{opacity:0;transform:translateY(60px) scale(0.9);}
    100%{opacity:1;transform:translateY(0) scale(1);}
  }
  @keyframes cardFloat{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
  }

  .title{
    font-size:clamp(30px,6vw,42px);
    background:linear-gradient(90deg,#fff, #ffd9e6 40%, #ffb3d1);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin:0 0 26px;
    text-shadow:0 0 30px rgba(255,180,210,0.35);
    letter-spacing:0.5px;
    font-weight:600;
  }

  .typewriter{
    min-height:230px;
    font-family:-apple-system,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
    font-size:16px;
    line-height:1.75;
    color:rgba(255,255,255,0.92);
    white-space:pre-wrap;
    margin-bottom:30px;
    text-align:left;
    padding:0 4px;
  }
  .typewriter .cursor{
    display:inline-block;width:2px;background:#ffdce8;margin-left:2px;
    animation:blink 0.9s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0;}}

  .btn-row{
    display:flex;gap:18px;justify-content:center;align-items:center;
    position:relative;
    min-height:64px;
  }

  .btn{
    border:none;border-radius:100px;
    padding:16px 34px;
    font-size:17px;font-weight:600;
    cursor:pointer;
    font-family:-apple-system,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
    position:relative;
    overflow:hidden;
    transition:transform 0.25s ease, box-shadow 0.25s ease;
    -webkit-tap-highlight-color:transparent;
  }

  .btn-yes{
    color:#fff;
    background:linear-gradient(135deg,#ff8fb3,#ff5c8a 45%,#b45cff);
    box-shadow:0 10px 30px rgba(255,90,140,0.5), 0 0 0 0 rgba(255,140,180,0.6);
    animation:pulseYes 2.2s ease-in-out infinite;
  }
  .btn-yes:hover{
    transform:translateY(-3px) scale(1.04);
    box-shadow:0 16px 40px rgba(255,90,140,0.65);
  }
  @keyframes pulseYes{
    0%,100%{box-shadow:0 10px 30px rgba(255,90,140,0.5), 0 0 0 0 rgba(255,140,180,0.5);}
    50%{box-shadow:0 10px 30px rgba(255,90,140,0.6), 0 0 0 14px rgba(255,140,180,0);}
  }
  .ripple{
    position:absolute;border-radius:50%;
    background:rgba(255,255,255,0.55);
    transform:scale(0);
    animation:rippleAnim 0.6s ease-out;
    pointer-events:none;
  }
  @keyframes rippleAnim{
    to{transform:scale(3.2);opacity:0;}
  }

  .btn-no{
    color:#5a2540;
    background:rgba(255,255,255,0.55);
    border:1px solid rgba(255,255,255,0.7);
    position:absolute;
    left:calc(50% + 62px);
    transition:transform 0.35s ease, left 0.35s ease, top 0.35s ease, opacity 0.35s ease;
  }

  .no-bubble-text{
    position:absolute;
    top:-38px;left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,0.85);
    color:#6a2340;
    padding:6px 14px;border-radius:14px;
    font-size:13px;font-weight:600;
    white-space:nowrap;
    box-shadow:0 6px 16px rgba(0,0,0,0.15);
    opacity:0;transition:opacity 0.3s ease;
  }
  .no-bubble-text.show{opacity:1;}

  /* ---------- Celebration ---------- */
  .celebrate-text{
    display:none;
    text-align:left;
    font-family:-apple-system,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
    font-size:16px;line-height:1.8;
    color:#fff;
    white-space:pre-wrap;
  }
  .card.celebrating .typewriter,
  .card.celebrating .btn-row{display:none;}
  .card.celebrating .celebrate-text{display:block;animation:fadeUp 1s ease both;}
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
  }

  .love-banner{
    position:fixed;
    top:8%;left:50%;transform:translateX(-50%) scale(0.5);
    font-size:clamp(28px,7vw,58px);
    font-weight:700;
    background:linear-gradient(90deg,#fff,#ffc2dc,#ffe0ea);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 40px rgba(255,150,190,0.6);
    z-index:50;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.8s ease, transform 0.8s cubic-bezier(.2,1.4,.4,1);
  }
  .love-banner.show{opacity:1;transform:translateX(-50%) scale(1);}

  .flash{
    position:fixed;inset:0;background:#fff;z-index:200;
    opacity:0;pointer-events:none;
  }
  .flash.active{
    animation:flashAnim 0.5s ease-out;
  }
  @keyframes flashAnim{
    0%{opacity:0.9;}
    100%{opacity:0;}
  }

  .fx-layer{position:fixed;inset:0;z-index:40;pointer-events:none;overflow:hidden;}

  .fx-heart{
    position:absolute;font-size:20px;color:#ff6f9c;
    text-shadow:0 0 8px rgba(255,110,150,0.8);
    animation:fxUp linear forwards;
  }
  .fx-petal{
    position:absolute;width:14px;height:10px;border-radius:60% 0 60% 0;
    background:linear-gradient(135deg,#ffb3c6,#ff7fa3);
    animation:fxFall linear forwards;
  }
  .fx-spark{
    position:absolute;width:6px;height:6px;border-radius:50%;
    background:#fff;box-shadow:0 0 8px 2px #ffdce8;
    animation:fxSpark ease-out forwards;
  }
  .fx-confetti{
    position:absolute;width:8px;height:14px;
    animation:fxFall linear forwards;
  }
  .fx-firework{
    position:absolute;width:4px;height:4px;border-radius:50%;
    animation:fxFireworkPiece ease-out forwards;
  }
  .fx-fragment{
    position:absolute;width:8px;height:8px;
    background:rgba(255,255,255,0.7);
    animation:fxFall linear forwards;
  }

  @keyframes fxUp{
    0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(-100vh) translateX(var(--drift,0px)) rotate(360deg);opacity:0;}
  }
  @keyframes fxFall{
    0%{transform:translateY(-10vh) translateX(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(110vh) translateX(var(--drift,0px)) rotate(400deg);opacity:0.9;}
  }
  @keyframes fxSpark{
    0%{transform:scale(0) translate(0,0);opacity:1;}
    100%{transform:scale(1.5) translate(var(--sx,0px),var(--sy,0px));opacity:0;}
  }
  @keyframes fxFireworkPiece{
    0%{transform:translate(0,0) scale(1);opacity:1;}
    100%{transform:translate(var(--fx,0px),var(--fy,0px)) scale(0.3);opacity:0;}
  }

  /* Body background swap after celebration */
  body.celebrating-bg .liquid-bg{
    animation-duration:14s;
    filter:blur(8px) saturate(1.5) brightness(1.05);
  }

  @media (max-width:480px){
    .card{padding:36px 22px 32px;border-radius:26px;}
    .btn{padding:14px 26px;font-size:15px;}
    .btn-no{left:calc(50% + 50px);}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}
  }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-heart"></div>
  <p class="body-font">Preparing something special...</p>
</div>

<div id="bg-canvas-wrap">
  <div class="liquid-bg"></div>
  <div class="aurora"></div>
  <div class="stars" id="stars"></div>
  <div id="bubbles"></div>
  <div id="drift-hearts"></div>
</div>

<div id="mouse-glow"></div>
<div class="flash" id="flash"></div>
<div class="fx-layer" id="fxLayer"></div>
<div class="love-banner" id="loveBanner">I Love You ❤️</div>

<div class="page">
  <div class="card" id="card">
    <h1 class="title display-font">Hey Megna ❤️</h1>

    <div class="typewriter body-font" id="typewriter"><span class="cursor">&nbsp;</span></div>

    <div class="celebrate-text body-font" id="celebrateText"></div>

    <div class="btn-row" id="btnRow">
      <button class="btn btn-yes" id="yesBtn">YES ❤️</button>
      <button class="btn btn-no" id="noBtn">
        <span class="no-bubble-text" id="noBubble"></span>
        NO 🙈
      </button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- Loader ---------------- */
  /* Script runs at the end of <body>, so the DOM is already ready here.
     We deliberately do NOT wait on window's "load" event, since that
     waits for every resource (including the favicon request) and can
     hang indefinitely if any request stalls. */
  setTimeout(function(){
    var loaderEl = document.getElementById("loader");
    if(loaderEl){ loaderEl.classList.add("hide"); }
    startTypewriter();
  }, 2200);

  /* ---------------- Background: stars ---------------- */
  var starsWrap = document.getElementById("stars");
  var starCount = 90;
  for(var i=0;i<starCount;i++){
    var s = document.createElement("div");
    s.className = "star";
    s.style.left = (Math.random()*100)+"%";
    s.style.top = (Math.random()*100)+"%";
    s.style.animationDelay = (Math.random()*3)+"s";
    s.style.animationDuration = (2+Math.random()*3)+"s";
    starsWrap.appendChild(s);
  }

  /* ---------------- Background: bubbles ---------------- */
  var bubbleWrap = document.getElementById("bubbles");
  function spawnBubble(){
    var b = document.createElement("div");
    b.className = "bubble";
    var size = 20 + Math.random()*70;
    b.style.width = size+"px";
    b.style.height = size+"px";
    b.style.left = (Math.random()*100)+"%";
    b.style.top = (100 + Math.random()*10)+"%";
    var dur = 14 + Math.random()*16;
    b.style.animationDuration = dur+"s";
    bubbleWrap.appendChild(b);
    setTimeout(function(){ b.remove(); }, dur*1000);
  }
  for(var j=0;j<10;j++){ setTimeout(spawnBubble, j*800); }
  setInterval(spawnBubble, 1600);

  /* ---------------- Background: drifting hearts ---------------- */
  var heartWrap = document.getElementById("drift-hearts");
  function spawnDriftHeart(){
    var h = document.createElement("div");
    h.className = "drift-heart";
    h.innerHTML = "❤";
    h.style.left = (Math.random()*100)+"%";
    h.style.top = "100%";
    h.style.fontSize = (14 + Math.random()*18)+"px";
    var dur = 12 + Math.random()*10;
    h.style.animationDuration = dur+"s";
    heartWrap.appendChild(h);
    setTimeout(function(){ h.remove(); }, dur*1000);
  }
  for(var k=0;k<6;k++){ setTimeout(spawnDriftHeart, k*1000); }
  setInterval(spawnDriftHeart, 2200);

  /* ---------------- Mouse glow + parallax ---------------- */
  var glow = document.getElementById("mouse-glow");
  var card = document.getElementById("card");
  window.addEventListener("mousemove", function(e){
    glow.style.left = e.clientX+"px";
    glow.style.top = e.clientY+"px";
    var relX = (e.clientX / window.innerWidth - 0.5);
    var relY = (e.clientY / window.innerHeight - 0.5);
    card.style.transform = "translate("+(relX*-8)+"px,"+(relY*-8)+"px)";
  });

  /* ---------------- Typewriter ---------------- */
  var fullText = "Out of all the beautiful moments life has given me, meeting you is still my favorite.\n"+
    "Every smile of yours makes my day brighter.\n"+
    "You are the reason ordinary moments feel special.\n\n"+
    "So today...\n"+
    "I just want to ask one simple question...\n\n"+
    "Will you be mine? ❤️";

  var twEl = document.getElementById("typewriter");
  function startTypewriter(){
    var i = 0;
    var cursor = document.createElement("span");
    cursor.className = "cursor";
    cursor.innerHTML = "&nbsp;";
    twEl.innerHTML = "";
    var textNode = document.createTextNode("");
    twEl.appendChild(textNode);
    twEl.appendChild(cursor);

    function tick(){
      if(i < fullText.length){
        textNode.textContent += fullText.charAt(i);
        i++;
        var delay = 28;
        var c = fullText.charAt(i-1);
        if(c === "." || c === "\n") delay = 260;
        setTimeout(tick, delay);
      }
    }
    tick();
  }

  /* ---------------- YES button ---------------- */
  var yesBtn = document.getElementById("yesBtn");
  var noBtn = document.getElementById("noBtn");
  var noBubble = document.getElementById("noBubble");
  var btnRow = document.getElementById("btnRow");
  var celebrateText = document.getElementById("celebrateText");
  var fxLayer = document.getElementById("fxLayer");
  var flash = document.getElementById("flash");
  var loveBanner = document.getElementById("loveBanner");

  yesBtn.addEventListener("click", function(e){
    var rect = yesBtn.getBoundingClientRect();
    var ripple = document.createElement("span");
    ripple.className = "ripple";
    var size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size+"px";
    ripple.style.left = (e.clientX - rect.left - size/2)+"px";
    ripple.style.top = (e.clientY - rect.top - size/2)+"px";
    yesBtn.appendChild(ripple);
    setTimeout(function(){ ripple.remove(); }, 650);

    setTimeout(triggerCelebration, 200);
  });

  function triggerCelebration(){
    card.classList.add("celebrating");
    celebrateText.textContent =
      "Thank you for saying YES ❤️\n\n"+
      "You just made me the happiest person in the world.\n\n"+
      "I promise to always respect you,\n"+
      "care for you,\n"+
      "support you,\n"+
      "and keep making you smile.\n\n"+
      "I love you, Megna ❤️";

    document.body.classList.add("celebrating-bg");

    flashEffect();
    loveBanner.classList.add("show");
    setTimeout(function(){ loveBanner.classList.remove("show"); }, 3200);

    if(navigator.vibrate){ navigator.vibrate([80,40,80,40,160]); }

    burstFireworks();
    burstConfetti();
    burstPetals();
    burstSparkles();
    startForeverHearts();

    setInterval(burstFireworks, 3500);
    setInterval(function(){
      loveBanner.classList.add("show");
      setTimeout(function(){ loveBanner.classList.remove("show"); }, 2600);
    }, 8000);
  }

  function flashEffect(){
    flash.classList.remove("active");
    void flash.offsetWidth;
    flash.classList.add("active");
  }

  function rand(min,max){ return Math.random()*(max-min)+min; }

  function makeFx(cls, count,
